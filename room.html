<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Номер | ROYALHOTEL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .room-grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
            margin-top: 30px;
            align-items: flex-start;
        }
        .block-card {
            background: #12121a;
            border: 1px solid rgba(201, 165, 91, 0.15);
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .room-image {
            width: 100%;
            height: 480px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
        }
        .amenity-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0 25px;
        }
        .amenity-item {
            font-size: 0.85rem;
            color: #999;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .booking-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #c9a55b;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .date-input, .guest-select {
            width: 100%;
            background: #0d0d12;
            border: 1px solid #222;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            outline: none;
        }
        .date-input:focus, .guest-select:focus { border-color: #c9a55b; }
        .summary-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .total-price {
            font-size: 1.6rem;
            color: #c9a55b;
            font-weight: 700;
            text-align: right;
            margin-top: 10px;
        }
        .btn-booking {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #c9a55b;
            color: #000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-booking:hover { background: #e0bc6d; }
        .btn-booking:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }
        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo"><div class="logo-icon">R</div><span class="logo-text">ROYALHOTEL</span></div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Номера</a>
                <a href="profile.html">Профиль</a>
            </nav>
        </div>
    </header>

    <main class="container" id="roomView"></main>

    <script src="js/data.js"></script>
    <script>
        let currentRoom = null;
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            currentRoom = getRooms().find(r => r.id == id);
            if (!currentRoom) return location.href = 'catalog.html';
            render();
        }

        function checkBooking() {
            const cin = document.getElementById('cin').value;
            const cout = document.getElementById('cout').value;
            const btn = document.getElementById('bookBtn');
            const nightsUI = document.getElementById('nightsVal');
            const totalUI = document.getElementById('totalVal');
            const statusUI = document.getElementById('status');

            if (cin && cout) {
                const start = new Date(cin);
                const end = new Date(cout);
                const diff = (end - start) / (1000 * 60 * 60 * 24);

                if (diff <= 0) {
                    statusUI.style.color = "#ff4444";
                    statusUI.innerText = "Ошибка: дата выезда должна быть позже";
                    btn.disabled = true;
                    return;
                }

                const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
                const isTaken = bookings.some(b => 
                    b.roomId == currentRoom.id && 
                    (new Date(cin) < new Date(b.checkOut) && new Date(cout) > new Date(b.checkIn))
                );

                if (isTaken) {
                    statusUI.style.color = "#ff4444";
                    statusUI.innerText = "Номер занят на эти даты";
                    btn.disabled = true;
                    nightsUI.innerText = "0";
                    totalUI.innerText = "0 ₸";
                } else {
                    const total = diff * currentRoom.price_per_night;
                    nightsUI.innerText = diff;
                    totalUI.innerText = total.toLocaleString() + " ₸";
                    statusUI.style.color = "#44ff44";
                    statusUI.innerText = "Даты свободны";
                    btn.disabled = false;
                }
            }
        }

        function confirmBooking() {
            if (!currentUser) {
                alert('Вы не вошли в систему. Пожалуйста, зарегистрируйтесь или войдите.');
                location.href = 'register.html';
                return;
            }

            const booking = {
                id: Date.now(),
                userId: currentUser.id,
                roomId: currentRoom.id,
                roomName: currentRoom.name,
                checkIn: document.getElementById('cin').value,
                checkOut: document.getElementById('cout').value,
                guests: document.getElementById('guests').value,
                totalPrice: parseInt(document.getElementById('totalVal').innerText.replace(/\s/g, '')),
                createdAt: new Date().toISOString()
            };

            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            bookings.push(booking);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            
            alert('Успешно забронировано!');
            location.href = 'profile.html';
        }

        function render() {
            document.getElementById('roomView').innerHTML = `
                <div class="room-grid">
                    <div class="room-left">
                        <img src="${currentRoom.images[0]}" class="room-image">
                        <div class="block-card" style="margin-top: 24px;">
                            <h1 style="margin-bottom: 15px;">${currentRoom.name}</h1>
                            <p style="color: #888; line-height: 1.6;">${currentRoom.description}</p>
                        </div>
                    </div>

                    <div class="room-right">
                        <div class="block-card">
                            <span class="booking-label">Даты проживания</span>
                            <input type="date" id="cin" class="date-input" onchange="checkBooking()">
                            <input type="date" id="cout" class="date-input" onchange="checkBooking()">

                            <span class="booking-label">Количество гостей (1-4)</span>
                            <select id="guests" class="guest-select">
                                <option value="1">1 человек</option>
                                <option value="2">2 человека</option>
                                <option value="3">3 человека</option>
                                <option value="4">4 человека</option>
                            </select>

                            <span class="booking-label">Удобства номера</span>
                            <div class="amenity-list">
                                ${currentRoom.amenities.map(a => `<div class="amenity-item">${a}</div>`).join('')}
                            </div>

                            <div class="summary-box">
                                <div class="summary-row">
                                    <span>Цена за ночь:</span>
                                    <span>${currentRoom.price_per_night.toLocaleString()} ₸</span>
                                </div>
                                <div class="summary-row">
                                    <span>Ночей:</span>
                                    <span id="nightsVal">0</span>
                                </div>
                                <div class="total-price" id="totalVal">0 ₸</div>
                            </div>

                            <button id="bookBtn" class="btn-booking" disabled onclick="confirmBooking()">Забронировать</button>
                            <div id="status"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
