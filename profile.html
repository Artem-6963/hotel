<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | ROYALHOTEL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-badge { background: #c9a55b; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        .section-title { margin: 40px 0 20px; color: #c9a55b; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; border-left: 3px solid #c9a55b; padding-left: 15px; }
        .card-item { background: #12121a; border: 1px solid rgba(201, 165, 91, 0.1); padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .info-label { color: #c9a55b; font-size: 0.8rem; margin-bottom: 5px; display: block; }
        .btn-cancel { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 8px 16px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; border-radius: 4px; }
        .btn-cancel:hover { background: #ff4444; color: #fff; }
        .user-info-grid { display: grid; grid-template-columns: 0.5fr 1fr 1fr; gap: 20px; width: 100%; }
    </style>
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo"><div class="logo-icon">R</div><span class="logo-text">ROYALHOTEL</span></div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Номера</a>
                <a href="profile.html" class="active">Профиль</a>
                <a href="#" onclick="logout()">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div style="margin: 40px 0;">
            <h1 id="userName">Загрузка...</h1>
            <p id="userStatus" style="color: #666;"></p>
        </div>

        <div id="adminSections" style="display: none;">
            <div class="section-title">Зарегистрированные пользователи</div>
            <div id="usersList"></div>
        </div>

        <div class="section-title" id="bookingTitle">Ваши бронирования</div>
        <div id="bookingsContainer"></div>
    </main>

    <script src="js/data.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = 'login.html';
        }

        function renderProfile() {
            const nameEl = document.getElementById('userName');
            const statusEl = document.getElementById('userStatus');
            const bookingsCont = document.getElementById('bookingsContainer');
            const usersCont = document.getElementById('usersList');
            const adminSec = document.getElementById('adminSections');
            const bookingTitle = document.getElementById('bookingTitle');
            
            nameEl.innerHTML = currentUser.name + (currentUser.role === 'admin' ? '<span class="admin-badge">ADMIN</span>' : '');
            
            const allBookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const allUsers = JSON.parse(localStorage.getItem('users')) || [];

            if (currentUser.role === 'admin') {
                statusEl.innerText = 'Панель администратора';
                adminSec.style.display = 'block';
                bookingTitle.innerText = 'Все бронирования отеля';

                usersCont.innerHTML = allUsers.map(u => `
                    <div class="card-item">
                        <div class="user-info-grid">
                            <div><span class="info-label">ID</span>${u.id}</div>
                            <div><span class="info-label">Имя</span>${u.name}</div>
                            <div><span class="info-label">Логин</span>${u.email}</div>
                        </div>
                        ${u.role !== 'admin' ? `
                            <button onclick="deleteUser(${u.id})" class="btn-cancel">Удалить</button>
                        ` : '<span style="font-size:10px; color:#444;">ADMIN</span>'}
                    </div>
                `).join('');

                renderBookings(allBookings, bookingsCont, true);
            } else {
                statusEl.innerText = 'Личный кабинет клиента';
                const myBookings = allBookings.filter(b => b.userId === currentUser.id);
                renderBookings(myBookings, bookingsCont, false);
            }
        }

        function renderBookings(list, container, isAdmin) {
            if (list.length === 0) {
                container.innerHTML = '<div class="card-item">Бронирований нет</div>';
                return;
            }
            container.innerHTML = list.map(b => `
                <div class="card-item">
                    <div>
                        ${isAdmin ? `<span class="info-label">Клиент ID: ${b.userId}</span>` : ''}
                        <h3 style="margin-bottom: 5px;">${b.roomName}</h3>
                        <p style="color: #888; font-size: 0.9rem;">${b.checkIn} — ${b.checkOut} | Гостей: ${b.guests || 1}</p>
                    </div>
                    <div style="text-align: right;">
                        <div style="margin-bottom: 10px; font-weight: bold; color: #c9a55b;">${(b.totalPrice || 0).toLocaleString()} ₸</div>
                        <button onclick="cancelBooking(${b.id})" class="btn-cancel">Отменить</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteUser(userId) {
            if (confirm('Удалить пользователя и все его бронирования?')) {
                // 1. Удаляем пользователя
                let users = JSON.parse(localStorage.getItem('users')) || [];
                users = users.filter(u => u.id !== userId);
                localStorage.setItem('users', JSON.stringify(users));

                // 2. Удаляем его брони
                let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
                bookings = bookings.filter(b => b.userId !== userId);
                localStorage.setItem('bookings', JSON.stringify(bookings));

                renderProfile();
            }
        }

        function cancelBooking(id) {
            if (confirm('Отменить бронирование?')) {
                let all = JSON.parse(localStorage.getItem('bookings')) || [];
                all = all.filter(b => b.id !== id);
                localStorage.setItem('bookings', JSON.stringify(all));
                renderProfile();
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', renderProfile);
    </script>
</body>
</html>
