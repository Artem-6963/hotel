<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ROYALHOTEL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo">
                <div class="logo-icon">R</div>
                <span class="logo-text">ROYALHOTEL</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Номера</a>
                <a href="login.html" class="active">Вход</a>
                <a href="register.html">Регистрация</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="auth-container">
            <h2>Вход в аккаунт</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn" style="width:100%">Войти</button>
                <div id="loginError" class="error-msg"></div>
            </form>
            <p style="margin-top:20px; text-align:center">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
            <p style="margin-top:10px; text-align:center; font-size:12px; color:#666">
            </p>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>© 2026 ROYALSTAY | Премиум отель</p>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').textContent = 'Неверный email или пароль';
            }
        });
    </script>
</body>
</html>
